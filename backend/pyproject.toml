[tool.ruff]
target-version = "py311"
line-length = 100
src = ["app", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = [
    "E501",   # line too long — handled by formatter
]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
exclude = ["^tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
filterwarnings = [
    # Third-party: starlette's TestClient nudges toward httpx2; not actionable for us.
    "ignore:Using `httpx` with `starlette.testclient` is deprecated",
]
