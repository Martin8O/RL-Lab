<rect x="301" y="174" width="120" height="28" rx="14" fill="#191E30" stroke="#33304F"/>
<g transform="translate(313,190)" fill="#FAC775"><rect x="-4.3" y="-4.3" width="8.6" height="8.6" rx="1.5"/><rect x="-4.3" y="-4.3" width="8.6" height="8.6" rx="1.5" transform="rotate(45)"/><circle cx="0" cy="0" r="2.4" fill="#191E30"/></g>
<g transform="translate(320,182.5)" fill="#FAC775"><rect x="-2.9" y="-2.9" width="5.8" height="5.8" rx="1"/><rect x="-2.9" y="-2.9" width="5.8" height="5.8" rx="1" transform="rotate(45)"/><circle cx="0" cy="0" r="1.6" fill="#191E30"/></g>
<text x="333" y="192" fill="#C9CBE0">7 algorithms</text>

<rect x="427" y="174" width="130" height="28" rx="14" fill="#191E30" stroke="#33304F"/>
<g transform="translate(443,188)" stroke="#FAC775" stroke-width="1.6" stroke-linecap="round"><line x1="-4.5" y1="4.5" x2="4.5" y2="-4.5"/><line x1="4.5" y1="4.5" x2="-4.5" y2="-4.5"/><line x1="-6.3" y1="2.7" x2="-2.7" y2="6.3"/><line x1="6.3" y1="2.7" x2="2.7" y2="6.3"/></g>
<g transform="translate(443,188)" fill="#FAC775"><circle cx="-5.4" cy="5.4" r="1.1"/><circle cx="5.4" cy="5.4" r="1.1"/></g>
<g transform="translate(443,188)" fill="#FFE0A6"><path d="M4.5,-4.5 l1.8,-1 -0.8,2 z"/><path d="M-4.5,-4.5 l-1.8,-1 0.8,2 z"/></g>
<text x="459" y="192" fill="#C9CBE0">play vs your AI</text>

<rect x="562" y="174" width="100" height="28" rx="14" fill="#191E30" stroke="#33304F"/>
<g transform="translate(578,188)"><path d="M-6.5,0 Q0,-5.2 6.5,0 Q0,5.2 -6.5,0 Z" fill="none" stroke="#FAC775" stroke-width="1.3"/><circle cx="0" cy="0" r="2.1" fill="none" stroke="#FAC775" stroke-width="1.2"/></g>
<text x="594" y="192" fill="#C9CBE0">watch live</text>
