<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="452" viewBox="0 0 680 240" role="img">
<title>RL Lab — train, watch and play reinforcement-learning agents</title>
<desc>RL Lab: 100+ games, 7 algorithms, play vs your AI, watch live.</desc>
<defs>
<linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#322A63"/><stop offset="1" stop-color="#16122C"/></linearGradient>
<radialGradient id="neb1" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#5043A8" stop-opacity=".6"/><stop offset="1" stop-color="#5043A8" stop-opacity="0"/></radialGradient>
<radialGradient id="neb2" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#1E6FA8" stop-opacity=".5"/><stop offset="1" stop-color="#1E6FA8" stop-opacity="0"/></radialGradient>
<radialGradient id="amberGlow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#F0A93A" stop-opacity=".55"/><stop offset="1" stop-color="#F0A93A" stop-opacity="0"/></radialGradient>
<filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.5"/></filter>
<filter id="softBig" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6"/></filter>
</defs>

<rect width="680" height="240" rx="14" fill="#090B14"/>
<ellipse cx="150" cy="110" rx="300" ry="190" fill="url(#neb1)"/>
<ellipse cx="560" cy="210" rx="280" ry="170" fill="url(#neb2)"/>
<ellipse cx="470" cy="40" rx="200" ry="130" fill="url(#neb1)" opacity=".5"/>

<g fill="#FFFFFF"><circle cx="300" cy="36" r="1" opacity=".4"/><circle cx="360" cy="64" r="1.4" opacity=".5"/><circle cx="430" cy="40" r="1" opacity=".3"/><circle cx="500" cy="70" r="1.2" opacity=".4"/><circle cx="560" cy="44" r="1" opacity=".35"/><circle cx="610" cy="96" r="1.6" opacity=".5"/><circle cx="648" cy="150" r="1.2" opacity=".4"/><circle cx="600" cy="200" r="1" opacity=".3"/><circle cx="520" cy="196" r="1.3" opacity=".4"/><circle cx="660" cy="60" r="1" opacity=".3"/><circle cx="340" cy="206" r="1" opacity=".3"/><circle cx="250" cy="150" r="1" opacity=".25"/></g>
<g fill="#FFFFFF"><circle cx="588" cy="130" r="3.4" opacity=".25" filter="url(#soft)"/><circle cx="588" cy="130" r="1.5" opacity=".9"/><circle cx="392" cy="120" r="3" opacity=".22" filter="url(#soft)"/><circle cx="392" cy="120" r="1.3" opacity=".85"/></g>

<circle cx="100" cy="120" r="118" fill="url(#amberGlow)"/>
<rect x="36" y="56" width="128" height="128" rx="30" fill="url(#tg)"/>
<rect x="36.7" y="56.7" width="126.6" height="126.6" rx="29.4" fill="none" stroke="#4A4280" stroke-width="1"/>

<circle cx="100" cy="120" r="41" fill="none" stroke="#F5B84A" stroke-width="6" opacity=".5" filter="url(#softBig)"/>
<circle cx="100" cy="120" r="9" fill="#F0A93A" opacity=".7" filter="url(#soft)"/>
<g transform="translate(100,120) scale(1.7)">
<path d="M-20,-13 A24,24 0 0 1 20,-13" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
<path d="M20,13 A24,24 0 0 1 -20,13" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
<path d="M21.6,-7.7 L24,-14.2 L16,-11.8 Z" fill="#F0A93A"/>
<path d="M-21.6,7.7 L-24,14.2 L-16,11.8 Z" fill="#F0A93A"/>
<circle cx="0" cy="0" r="6.2" fill="#F0A93A"/>
<circle cx="-1.8" cy="-2" r="2.2" fill="#FFE0A6"/>
<path d="M25.5,-29 L27.5,-24 L32.5,-22 L27.5,-20 L25.5,-15 L23.5,-20 L18.5,-22 L23.5,-24 Z" fill="#FAC775"/>
</g>

<text x="200" y="116" font-family="'IBM Plex Sans','Inter','Segoe UI',system-ui,sans-serif" font-weight="700" font-size="50" fill="#F6F4FF">RL <tspan fill="#F2AE43">Lab</tspan></text>
<text x="202" y="148" font-family="'IBM Plex Sans','Inter','Segoe UI',system-ui,sans-serif" font-weight="400" font-size="15" fill="#AEB0CC">Train, watch &amp; play — CartPole to Atari, physics &amp; board games.</text>
<g font-family="'IBM Plex Sans','Inter','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="500">
<rect x="200" y="174" width="96" height="28" rx="14" fill="#191E30" stroke="#33304F"/>
